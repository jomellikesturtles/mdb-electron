name: Deploy to GitHub Pages

on:
  push:
    branches: [master] # Triggers the workflow on push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy_angular:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Print
        run: echo "Checking out"
      - name: Checkout
        uses: actions/checkout@v4 # Use the checkout action to get your code
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Angular
        run: npm run build:web:prod
      - name: Print
        run: echo "Uploading artifact"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Uploads the static files
        with:
          path: "./dist/mdb-electron"
      - name: Print
        run: echo "Deploying page"
      - name: Deploy to GitHub Pages # temp hosting
        if: ${{ !env.ACT }}
        id: deployment
        uses: actions/deploy-pages@v4 # The official GitHub Pages deployment action

  build_and_release_electron:
    name: \[Electron\] Build, Package, Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      # - name: Build AngularThe commented line `# run: npm run build:electron:prod` is likely a command that would run a script named `build:electron:prod` defined in the `package.json` file of the project. This script is typically used in Electron projects to build the application for production deployment.

      #   run: npm run build:electron:prod

      - name: Build/release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          # GitHub token, automatically provided to the action
          # (No need to define this secret in the repo settings)
          github_token: ${{ secrets.PAT_GITHUB }}

          # If the commit is tagged with a version (e.g. "v1.0.0"),
          # release the app after building
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}

  sync-to-platform:
    runs-on: ubuntu-latest
    needs: build_and_deploy_angular
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Minifiers
        run: npm install -g html-minifier-terser clean-css-cli terser

      - name: Build Minified Assets
        run: |
          mkdir -p output
          cp -r vanilla-portfolio/assets output/
          html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true -o output/index.html vanilla-portfolio/index.html
          cleancss -o output/styles.css vanilla-portfolio/styles.css
          terser vanilla-portfolio/script.js --compress --mangle -o output/script.js
          cp vanilla-portfolio/footer.js output/ 2>/dev/null || true

      - name: Checkout Target (mdb-platform)
        uses: actions/checkout@v4
        with:
          repository: jomellikesturtles/mdb-platform
          token: ${{ secrets.PAT_GITHUB }}
          path: mdb-platform

      - name: Create Pull Request on mdb-platform
        run: |
          cd mdb-platform
          # Update assets in the subfolder
          rm -rf mdb-overview/assets mdb-overview/index.html mdb-overview/styles.css mdb-overview/script.js mdb-overview/footer.js
          cp -r ../output/* mdb-overview/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="sync-overview-$(date +%Y%m%d%H%M%S)"
          git checkout -b $BRANCH_NAME
          git add .

          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "chore: sync assets from mdb-overview"
          git push origin $BRANCH_NAME

          gh pr create --title "Sync: Portfolio Assets Update" --body "Automated PR to sync built assets from mdb-overview repo." --base master --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB }}
