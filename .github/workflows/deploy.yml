name: Deploy MDB Electron

on:
  push:
    branches: [master] # Triggers the workflow on push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy_angular:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Print
        run: echo "Checking out"
      - name: Checkout
        uses: actions/checkout@v4 # Use the checkout action to get your code
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Angular
        run: npm run build:web:prod
      - name: Print
        run: echo "Uploading artifact"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Uploads the static files
        with:
          path: "./dist/mdb-electron"
      - name: Print
        run: echo "Deploying page"
      - name: Deploy to GitHub Pages # temp hosting
        if: ${{ !env.ACT }}
        id: deployment
        run: echo "Simulating deployment..."
        # uses: actions/deploy-pages@v4 # The official GitHub Pages deployment action

  build_and_release_electron:
    name: \[Electron\] Build, Package, Release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular
        run: npm run build:electron:prod

      - name: Build/Package Electron app
        run: npm run make

      - name: Push to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT_GITHUB }}
          tag_name: v0.0.${{ github.run_number }}
          name: Release v0.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            out/make/**/*.zip
            out/make/**/*.dmg

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mdb-electron:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mdb-electron:${{ github.sha }}

  sync-to-platform:
    runs-on: ubuntu-latest
    needs: build_and_deploy_angular
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Angular
        run: npm run build:web:prod
      - name: Checkout Target (mdb-platform)
        uses: actions/checkout@v4
        with:
          repository: jomellikesturtles/mdb-platform
          token: ${{ secrets.PAT_GITHUB }}
          path: mdb-platform

      - name: Update assets in mdb-platform
        run: |
          mkdir -p mdb-platform/mdb-electron
          # Clean up old assets to ensure a clean sync
          rm -rf mdb-platform/mdb-electron/*
          # Copy the entire build output folder to the target repository
          cp -r dist/mdb-electron/. mdb-platform/mdb-electron/

      - name: Create Pull Request on mdb-platform

        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_GITHUB }}
          path: mdb-platform
          commit-message: "chore: sync assets from mdb-electron"
          branch: user-web-app
          delete-branch: true
          title: "Sync: Portfolio Assets Update"
          body: |
            Automated PR to sync built files from mdb-electron repo.

            This PR updates the build files in `mdb-electron/` subfolder.
          base: master
