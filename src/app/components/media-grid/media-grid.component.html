<div [hidden]='true' style='background-color: black;width: 100%;height:100vh;'>

</div>
<app-selected-list></app-selected-list>

<select class="form-control" [(ngModel)]="cardWidth" style='width: 200px; float:right'>
  <option value='100px'>small</option>
  <option value='130px'>medium</option>
  <option value='180px'>large</option>
  <option value='250px'>xtra large</option>
</select>

<div class="container-fluid">

  <div *ngIf='mediaList.length===0 && !isProccessing'>
    <h1 class='jumbo-message'>No results found :(</h1>
  </div>

  <div *ngIf='isProccessing'>
    <h1 class='jumbo-message'>
      Loading {{gridTitle}}...</h1>
  </div>

  <h1 *ngIf="mediaList.length>0">{{gridTitle}}</h1>

  <div *ngIf='mediaList.length>0'>

    <app-card-list [movieList]='mediaList' [cardWidth]='cardWidth' [displayMode]='"movie-cards-display-grid"'
      [listType]='"none"'></app-card-list>
    <div id="loadMoreResults" *ngIf='hasMoreResults && !procLoadMoreResults'
      style='width: 100%; text-align: center; height: 80px;'>
      <h5 class='text-hyperlink' (click)='getMoreResults()'>Load more results...</h5>
    </div>
    <div *ngIf='procLoadMoreResults'>
      <mat-spinner [diameter]='20'></mat-spinner>
    </div>
  </div>
</div>
