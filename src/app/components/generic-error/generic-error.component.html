<div
  class="flex flex-col items-center justify-center h-screen w-full bg-[#141414] text-white p-6 relative overflow-hidden select-none">
  <div class="absolute w-[500px] h-[500px] bg-[#E50914] opacity-[0.03] rounded-full blur-[120px] pointer-events-none">
  </div>

  <div class="z-10 text-center max-w-md">
    <div class="glow-container mb-6">
      <svg class="w-16 h-16 text-[#E50914]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>

    <h1
      class="text-4xl font-extrabold tracking-tight mb-3 uppercase bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-500">
      Something Went Wrong
    </h1>
    <p class="text-gray-400 font-light mb-6 leading-relaxed">
      An unexpected error occurred while loading this page. Please try reloading or return to the previous screen.
    </p>

    <!-- Glassmorphic Quote Block -->
    <div *ngIf="troubleQuote" class="quote-card mb-8">
      <p class="quote-text">"{{ troubleQuote.quote }}"</p>
      <span class="quote-author">— {{ troubleQuote.title }} ({{ troubleQuote.year }})</span>
    </div>

    <div class="flex items-center justify-center gap-4">
      <button (click)="goBack()"
        class="px-5 py-2.5 rounded-md border border-gray-700 text-gray-300 font-medium hover:bg-white/5 hover:text-white transition-all duration-200 text-sm">
        Go Back
      </button>
      <button (click)="reload()"
        class="px-5 py-2.5 rounded-md bg-[#E50914] text-white font-medium hover:bg-[#b80710] shadow-lg shadow-[#E50914]/20 transition-all duration-200 text-sm">
        Reload Page
      </button>
    </div>
  </div>
</div>
