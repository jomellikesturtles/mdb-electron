<div class='container-fluid' style='height:100%'>
  <div class='row' style='height:100%'>
    <!-- sign in -->
    <div class='col col-6' style='height:100%'>
      <h3>Sign In</h3>
      <form [formGroup]="signInForm" #formDir='ngForm' (ngSubmit)="onSignIn()">
        <div class="cross-validation"
          [class.cross-validation-error]='signInForm.errors?.isInvalidCredentials && (signInForm.touched || signInForm.dirty)'>
          <div class='form-group'>
            <label for='usernameEmail'>Username or Email: </label>
            <input class='form-control' id='usernameEmail' formControlName='usernameEmail'
              placeholder="Username or Email" required>
          </div>
        </div>
        <div class='form-group'>
          <label for='passwordInput'>Password: </label>
          <input class='form-control' id='passwordInput' formControlName='password' placeholder="Password"
            type='password' required>
          <div *ngIf="password.invalid && (password.dirty || password.touched)" class="alert alert-danger">
            <div *ngIf="password.errors.required">
              Password is required.
            </div>
          </div>
        </div>
        <button class='btn btn-success' type='submit' [disabled]='signInForm.invalid' style='width: 100%;
        border-radius: 50px;'>Sign
          in</button>

        <button (click)='onSignInGoogle()' class='btn btn-success'>Sign in with Gooogle</button>
      </form>
      <a class='text-hyperlink' routerLink="/user/reset-password">Forgotten your password?</a>
      Not registered yet? <b class='text-hyperlink' routerLink="/user/register">Sign up</b>
    </div>
    <div class='col col-6 image-container'
      style='height:100%;width:100%;background-image: linear-gradient(to left, rgba(245, 246, 252, 0), rgba(-0, 0, 0, 10.73)), url(./assets/backdrops/gone_with_the_wind-backdrop.jpg);'>
    </div>
  </div>
</div>
