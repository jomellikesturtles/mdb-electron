<div *ngIf="isMetadataLoaded" [ngClass]="{'user-inactive':isUserInactive}">

  <div id='videoPlayerOuter' class="video-player-outer" (mousemove)='onNotIdle()' (keydown)="onKeyPress($event)" (dragover)="onDragOver($event)" (drop)="onDrop($event)" tabindex="1">

    <!-- top HUD -->
    <!-- back, title, -->
    <div class="player-header">
      <button class="back-btn" (click)="goBack()" matTooltip="Back">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <span class="player-title">{{ title || 'MDB Movie' }}</span>
    </div>

    <!-- actual video -->
    <div id='videoContainer' style='position: absolute; width:100%; height:100%; text-align:center; z-index: 20;'
      (click)='togglePlay()' (dblclick)='toggleFullScreen()'>
      <!-- videoPlayerhere -->
      <video #videoPlayer1 id='videoPlayer' style="width:100%; height:100%;" poster="">
        <source [src]='streamLink' controlsList="nodownload" type="video/mp4">
      </video>
    </div>

    <!-- Spinner Loader -->
    <div *ngIf="isSeeking" class="player-center-overlay">
      <mat-spinner [diameter]="100"></mat-spinner>
    </div>

    <!-- BEZEL / ACTION OVERLAY -->
    <div *ngIf="actionOverlayIcon || actionOverlayText" class="action-overlay-container">
      <mat-icon class="action-overlay-icon">{{ actionOverlayIcon }}</mat-icon>
      <span class="action-overlay-text">{{ actionOverlayText }}</span>
    </div>

    <!-- SUBTITLES -->
    <div style='position: absolute; z-index: 21; bottom: 100px; display:flex;
    width: 100%; align-items: center;flex-direction: column;
    text-shadow: -2px 2px 2px #000000;' [hidden]="!isShowSubtitles">
      <span class='subtitle-span'
            [style.fontSize]="subtitleDisplaySettings?.fontSize || '2.5vh'"
            [style.color]="subtitleDisplaySettings?.fontColor ? 'rgba(' + subtitleDisplaySettings.fontColor + ',1)' : ''"
            [style.backgroundColor]="subtitleDisplaySettings?.backgroundColor ? 'rgba(' + subtitleDisplaySettings.backgroundColor + ',' + (subtitleDisplaySettings.backgroundOpacity || '1') + ')' : ''"
            [innerHTML]="subtitleLine1"></span><br />
      <span class='subtitle-span'
            [style.fontSize]="subtitleDisplaySettings?.fontSize || '2.5vh'"
            [style.color]="subtitleDisplaySettings?.fontColor ? 'rgba(' + subtitleDisplaySettings.fontColor + ',1)' : ''"
            [style.backgroundColor]="subtitleDisplaySettings?.backgroundColor ? 'rgba(' + subtitleDisplaySettings.backgroundColor + ',' + (subtitleDisplaySettings.backgroundOpacity || '1') + ')' : ''"
            [innerHTML]="subtitleLine2"></span>
    </div>
    <!-- <app-video-player-stats [stats]='statsForNerds'>

    </app-video-player-stats> -->

    <!-- [isPaused]='videoPlayer1.paused' -->
    <!-- [videoPlayer1]='videoPlayer1' -->
    <!-- canPlay {{canPlay}}
    isUserInactive{{isUserInactive}} -->
    <mdb-video-player-controls *ngIf='canPlay' [isPlaying]='isPlaying'
      [isMuted]='videoPlayerElement?.muted || false' [isShowSubtitles]='isShowSubtitles' [canPlay]='canPlay'
      [videoPlayerElement]='videoPlayerElement' [volume]='volume' [videoTime]='videoTime' [progressBar]='progressBar'
      [isAskAiEnabled]="isFeatureEnabled('askAi')"
      (onSeekValue)='onSeek($event)' (onTogglePlay)='togglePlay()' (onToggleMute)='toggleMute()'
      (onToggleFullScreen)='toggleFullScreen()' (onToggleSubtitles)='isShowSubtitles = $event'
      (onChangeVolume)='changeVolume($event)' (onChangeSubtitleFile)='onChangeCc($event)'
      (onChangeFontColor)='changeFontColor($event)' (onChangeFontSize)='changeFontSize($event)'
      (onChangeBackgroundColor)='changeBackgroundColor($event)'
      (onChangeBackgroundOpacity)='changeBackgroundOpacity($event)'
      (onAdjustFontSize)='adjustSubtitleSize($event)'
      (onToggleAiChat)='toggleAiChat()'>
    </mdb-video-player-controls>

    <!-- Ask AI Panel -->
    <div *ngIf="showAiChat && isFeatureEnabled('askAi')" class="ai-chat-panel">
      <div class="chat-header">
        <h3>MDB AI Assistant</h3>
        <button mat-icon-button (click)="toggleAiChat()">
          <mat-icon style="color: white;">close</mat-icon>
        </button>
      </div>

      <div class="chat-messages" #chatScrollContainer>
        <div *ngFor="let msg of aiMessages" class="message-wrapper" [class.user]="msg.sender === 'user'">
          <div class="message-bubble" [class.user-bubble]="msg.sender === 'user'">
            <p>{{ msg.text }}</p>
          </div>
        </div>
        <div *ngIf="isAiTyping" class="message-wrapper">
          <div class="message-bubble ai-typing">
            <span>●</span><span>●</span><span>●</span>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" [(ngModel)]="aiInput" (keydown.enter)="sendAiMessage()" placeholder="Ask about the movie..." />
        <button (click)="sendAiMessage()" [disabled]="!aiInput.trim()">
          <mat-icon>send</mat-icon>
        </button>
      </div>
    </div>

  </div>
</div>
